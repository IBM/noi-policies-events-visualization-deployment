<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Policy and Event Data Visualization</title>

  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.1/css/dataTables.bootstrap5.min.css" />
  <link rel="stylesheet" href="/static/advanced-filter.css" />
  <style>table.dataTable{table-layout:auto!important}</style>
  <script src="/api/config"></script>
  <script src="/static/config-handler.js"></script>
</head>
<body>
  <div class="container-fluid">
    <header class="bg-light text-dark p-2" style="margin-top:5px">
      <div class="d-flex justify-content-between align-items-center gap-3">
        <div id="topbar" class="d-flex flex-wrap align-items-center justify-content-between mb-3">
          <h1 id="page-title" class="m-0">Policy and Event Data Visualization</h1><br>
        </div>
      </div>
    </header>

    <div id="topbar" class="d-flex flex-wrap align-items-center justify-content-between mb-3" style="margin-top:5px">
      <div class="d-flex flex-wrap align-items-center gap-2">
        <form id="registry-form" class="d-flex flex-wrap align-items-center gap-2">
          <label for="registry-url" class="form-label m-0 me-1 fw-semibold">Policy Registry URL</label>
          <input type="url" id="registry-url" class="form-control form-control-sm registry-url" placeholder="https://<hostname for policyregistry route>/api/policies/user/v1/policies/activate/system" />
          <input type="text" id="registry-username" class="form-control form-control-sm registry-user" placeholder="Username" />
          <input type="password" id="registry-password" class="form-control form-control-sm registry-pass" placeholder="Password" autocomplete="current-password" />
        </form>
      </div>
      
      <div id="logout-container" style="display: none;">
        <form action="/logout" method="post" style="margin: 0;">
          <button type="submit" id="logout-button" class="btn btn-sm btn-outline-danger">
            <i class="bi bi-box-arrow-right"></i> Logout
          </button>
        </form>
      </div>
    </div>

    <div id="main-row" class="row mt-3">
      <div id="policy-container" class="col-md-4">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h2>Policy Summary</h2>
            <div>
              <button id="expand-policies" class="btn btn-sm btn-outline-secondary" title="Expand policies"><i class="bi bi-arrows-angle-expand"></i></button>
              <button id="collapse-policies" class="btn btn-sm btn-outline-secondary" title="Collapse policies"><i class="bi bi-arrows-angle-contract"></i></button>
            </div>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table id="policy-table" class="col-md-4.table table-striped table-hover">
                <thead>
                  <tr>
                    <th>Policy ID</th>
                    <th>Ranking</th>
                    <th>Events</th>
                    <th>Occs</th>
                    <th>Deployed</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div id="events-container" class="col-md-8">
        <div class="card events-card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h2>Event Details for Policy: <span id="selected-policy">None</span></h2>
            <div>
              <button id="toggle-details" class="btn btn-sm btn-outline-info">Show Details</button>
              <button id="extract-data" class="btn btn-sm btn-outline-success" title="Extract all data to CSV"><i class="bi bi-file-earmark-spreadsheet"></i> Extract Data</button>
              <!-- <button id="extract-details" class="btn btn-sm btn-outline-primary" title="Parse JSON and display fields as columns"><i class="bi bi-file-earmark-text"></i> Expand JSON Fields</button> -->
              <button id="expand-events" class="btn btn-sm btn-outline-secondary" title="Expand events"><i class="bi bi-arrows-angle-expand"></i></button>
              <button id="collapse-events" class="btn btn-sm btn-outline-secondary" title="Collapse events"><i class="bi bi-arrows-angle-contract"></i></button>
            </div>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table id="events-table" class="table table-striped table-hover">
                <thead>
                  <tr>
                    <th>Event ID</th>
                    <th>Severity</th>
                    <th>Node</th>
                    <th>Summary</th>
                    <th class="details-col d-none">Details</th>
                    <th class="type-details-col d-none">Type</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="payload-container" class="mt-3">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h3 class="mb-0">Event Payload: <span id="selected-event">None</span></h3>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="pretty-json" checked>
                <label class="form-check-label" for="pretty-json">Pretty JSON</label>
              </div>
            </div>
            <div class="card-body">
              <pre id="payload-json" class="json-viewer">Select an event to view payload</pre>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.1/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.1/js/dataTables.bootstrap5.min.js"></script>
  <script src="/static/app.js"></script>
  <script src="/static/advanced-filter.js"></script>
</body>
</html>
